domain: RSS

PLUGIN_DISABLE:
  __BASE: {type: FAULT, level: MINOR, desc: sched plugin disable}
  PLUGIN_NAME: {type: STRING, desc: plugin name}

INIT_FAULT:
  __BASE: {type: FAULT, level: CRITICAL, desc: acritical error during initlization}
  MODULE_NAME: {type: STRING, desc: name of module}
  SCENE_NAME: {type: STRING, desc: scene of error}
  ERR_INFO: {type: STRING, desc: error information}

LIMIT_BOOST:
  __BASE: {type: BEHAVIOR, level: MINOR, desc: power or thermal limit status}
  CLIENT_ID: {type: INT32, desc: 1 means power 2 means thermal}
  ON_OFF_TAG: {type: BOOL, desc: can boost over max value or not}

LIMIT_REQUEST:
  __BASE: {type: BEHAVIOR, level: MINOR, desc: limit max to xx}
  CLIENT_ID: {type: INT32, desc: 1 means power 2 means thermal}
  RES_ID: {type: INT32, desc: number of node path config in socperf_resource_config}
  CONFIG: {type: INT64, desc: limit max to xx}

SERVICE_REQUEST_LIMIT:
  __BASE: {type: BEHAVIOR, level: MINOR, desc: RSS_SERVICE_REQUEST_LIMIT, preserve: true}
  REQUEST_LIMIT_COUNT: {type: INT32, desc: SERVICE_REQUEST_LIMIT_COUNT}

SYSTEM_LOAD_LEVEL:
  __BASE: {type: STATISTIC, level: MINOR, desc: Application subscription fusion level event, preserve: true}
  BUNDLE_NAMES: {type: STRING, arrsize: 100, desc: BUNDLE NAMES}

SUSPEND_STATE_CHANGE_ATTEMPT:
  __BASE: {type: BEHAVIOR, level: MINOR, desc: suspend state change attempt}
  TRIGGER_REASON: {type: STRING, desc: trigger reason for suspend state change}

TIMEOUT_ERR:
  __BASE: {type: FAULT, level: CRITICAL, desc: timeout error during operation}
  MODULE_NAME: {type: STRING, desc: name of module}
  SCENE_NAME: {type: STRING, desc: scene of error}
  TIME: {type: INT64, desc: time cost}
  ERR_INFO: {type: STRING, desc: error information}

SA_START_TIME:
  __BASE: {type: STATISTIC, level: MINOR, desc: service ability start time}
  SAID: {type: INT32, desc: system ability id}
  TOTAL_TIME: {type: INT64, desc: total time cost}

ABNORMAL_ERR:
  __BASE: {type: STATISTIC, level: CRITICAL, desc: abnormal error occurred}
  MODULE_NAME: {type: STRING, desc: name of module}
  FUNC_NAME: {type: STRING, desc: name of function}
  ERR_INFO: {type: STRING, desc: error information}

HOT_EVENT:
  __BASE: {type: STATISTIC, level: CRITICAL, desc: hot event statistics}
  RES_TYPE: {type: STRING, arrsize: 10, desc: hot event type list}
  COUNT: {type: INT32, arrsize: 10, desc: count list}
